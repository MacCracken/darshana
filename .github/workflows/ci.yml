name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:                    # reusable by release.yml as a gate

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        # Pulls the version pinned in cyrius.cyml [package].cyrius from
        # the upstream toolchain release artifact. Same pattern as chakshu.
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(grep 'cyrius *= *"' cyrius.cyml 2>/dev/null | head -1 | sed 's/.*"\(.*\)"/\1/')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        # darshana is a library; no external deps yet, just stdlib.
        # Footprint is tight (syscalls/alloc/io/assert) — see cyrius.cyml.
        run: cyrius deps

      - name: Build smoke binary
        run: |
          mkdir -p build
          cyrius build programs/smoke.cyr build/darshana-smoke

      - name: Run smoke binary
        # Compile-link smoke proves the include chain resolves end-to-end
        # and the dead-code-eliminator hasn't dropped a live symbol.
        run: |
          out=$(./build/darshana-smoke)
          test "$out" = "darshana smoke ok" || { echo "smoke output mismatch: $out"; exit 1; }

      - name: Lint
        # Same tolerance policy as chakshu/owl/cyim: every src file
        # clean; the only acceptable warning is the cosmetic
        # "exceeds 120 characters" rule on comment-divider lines.
        # cyrius lint exits non-zero on any output, so we wrap in
        # `|| true` to coexist with the implicit `set -e`.
        run: |
          fail=0
          for f in src/*.cyr; do
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out"
            bad=$(echo "$out" | grep -E '^\s*warn ' | grep -v 'exceeds 120 characters' || true)
            if [ -n "$bad" ]; then
              fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: non-cosmetic warnings present"; exit 1; }

      - name: Test
        # Explicit path — bare `cyrius test` (no arg) relies on
        # auto-discovery that has varied between cyrius releases
        # (and failed in CI on 5.10.20 with "No .tcyr files found in
        # tests/tcyr/ or tests/" despite tests/darshana.tcyr being
        # checked in). The documented form per `cyrius help test` is
        # `cyrius test <test.cyr>`; using it explicitly avoids the
        # discovery surface entirely.
        run: cyrius test tests/darshana.tcyr

      - name: Project smoke (scripts/smoke.sh)
        run: bash scripts/smoke.sh

      - name: distlib drift check
        # Regenerate dist/darshana.cyr from current sources and verify
        # it matches what's checked in. Without this, src/ changes can
        # land without the dist artifact getting refreshed — and
        # downstream consumers `include "lib/darshana.cyr"` (which is
        # this dist file), not src/. Drift here = consumers shipping
        # stale code.
        run: |
          cp dist/darshana.cyr /tmp/dist-checked-in.cyr
          cyrius distlib > /dev/null
          diff -q /tmp/dist-checked-in.cyr dist/darshana.cyr \
            || { echo "FAIL: dist/darshana.cyr is stale. Run 'cyrius distlib' and commit."; exit 1; }

      - name: DCE parity check
        # Release builds set CYRIUS_DCE=1. The DCE'd smoke binary
        # must produce the same output as the debug build, or the
        # DCE pass dropped something live.
        run: |
          CYRIUS_DCE=1 cyrius build programs/smoke.cyr build/darshana-smoke-dce
          echo "darshana-smoke-dce: $(wc -c < build/darshana-smoke-dce) bytes"
          out=$(./build/darshana-smoke-dce)
          test "$out" = "darshana smoke ok" || { echo "DCE smoke mismatch: $out"; exit 1; }

  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Scan for forbidden patterns in src/
        # darshana CLAUDE.md "Don't" invariants: no FFI / libc /
        # ncurses; Linux-only at v0.1.0–v0.4.x with the syscall arm
        # gated. Scan rules mirror chakshu's setup so the AGNOS
        # first-party stack stays uniformly hardened.
        run: |
          FAIL=0

          # No FFI / dynlib / pam imports (CLAUDE.md "no FFI / libc").
          ffi_hits=$(grep -rnE 'include "lib/(cffi|dynlib|fdlopen|pam)\.cyr"' src/ 2>/dev/null || true)
          if [ -n "$ffi_hits" ]; then
            echo "FAIL: FFI/dynlib/pam library import"
            echo "$ffi_hits"
            FAIL=1
          fi

          # Heap-allocate large data — same 64 KiB threshold owl/cyim/chakshu use.
          # darshana's stack buffers are termios (60 bytes) and the
          # cursor escape buf (32 bytes); flagging anything >= 64 KiB
          # catches a future contributor mistake.
          awk -F: '
            /var [A-Za-z_][A-Za-z0-9_]*\[[0-9]+\]/ {
              match($0, /\[[0-9]+\]/); s=substr($0,RSTART+1,RLENGTH-2); n=s+0;
              if (n >= 65536) print FILENAME":"NR": large stack buffer ("n" bytes): "$0
            }' src/*.cyr > /tmp/bigbuf.txt
          if [ -s /tmp/bigbuf.txt ]; then
            cat /tmp/bigbuf.txt
            FAIL=1
          fi

          # Linux-syscall arm must remain gated. termios.cyr's
          # SYS_IOCTL / TCGETS / TCSETS path uses Linux-specific magic
          # numbers; macOS/BSD termios layout differs. Verify the
          # `#ifdef CYRIUS_TARGET_LINUX` gate around the ioctl arm
          # is present so dist consumers cross-building for non-Linux
          # don't silently get wrong syscall numbers.
          if ! grep -q '#ifdef CYRIUS_TARGET_LINUX' src/termios.cyr; then
            echo "FAIL: src/termios.cyr missing CYRIUS_TARGET_LINUX gate"
            echo "  The ioctl/TCGETS/TCSETS arm is Linux-specific; macOS BSD"
            echo "  termios layout differs. Don't drop the gate without an"
            echo "  ADR documenting cross-platform termios handling."
            FAIL=1
          fi

          echo "security scan complete (fail: $FAIL)"
          exit $FAIL

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        # Set commits to maintaining at v0.2.0. SECURITY.md /
        # CODE_OF_CONDUCT.md will join when we have content.
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION LICENSE \
                   cyrius.cyml CLAUDE.md \
                   docs/development/roadmap.md docs/development/state.md \
                   docs/adr/0001-name-darshana.md \
                   dist/darshana.cyr; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        # Single source of truth is the VERSION file. Two derived
        # surfaces must agree: the CHANGELOG section header and the
        # cyrius.cyml file: indirection. The dist/darshana.cyr header
        # is regenerated by `cyrius distlib` from VERSION at build
        # time — drift is caught by build-and-test's distlib-drift
        # step, not here.
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -qE "^## \[${VERSION}\]" CHANGELOG.md \
            || { echo "FAIL: CHANGELOG.md missing section [${VERSION}]"; exit 1; }
          grep -qE '^version *= *"\$\{file:VERSION\}"' cyrius.cyml \
            || { echo "FAIL: cyrius.cyml version no longer pulls from VERSION"; exit 1; }
          echo "Version consistent: VERSION = CHANGELOG = cyrius.cyml = $VERSION"
